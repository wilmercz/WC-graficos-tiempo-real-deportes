<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARKI Deportes - Overlay</title>
    
    <!-- Firebase SDK (Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/panel-logos.css">
    <link rel="stylesheet" href="styles/panel-marcador.css">
    <link rel="stylesheet" href="styles/panel-marcador-basquet.css">
    <link rel="stylesheet" href="styles/panel-penales.css">
    <link rel="stylesheet" href="styles/panel-tercios.css">
    <link rel="stylesheet" href="styles/panel-publicidad.css">
    <link rel="stylesheet" href="styles/panel-portada.css">
</head>
<body>
    <!-- Contenedor Principal del Overlay -->
    <div id="overlay-container">
        
        <!-- Panel Portada (Cortina) -->
        <div id="panel-portada"></div>

        <!-- Panel 1: Logos -->
        <div id="panel-logos" class="panel">
            <!-- Contenido generado por panel-logos.js -->
        </div>
        
        <!-- Panel 2: Marcador -->
        <div id="panel-marcador" class="panel">
            <!-- Contenido por implementar --> 
        </div>


        <!-- Panel 3: Penales -->
        <div id="panel-penales" class="panel">
            <!-- Contenido por implementar -->
            <div class="penales-placeholder">
                <p>Panel Penales (Por Implementar)</p>
            </div>
        </div>
        
        <!-- Panel 4: Tercios Inferiores -->
        <div id="panel-tercios" class="panel">
            <!-- Contenido generado por panel-tercios.js -->
        </div>
        
        <!-- Panel 5: Publicidad (Lowerthirds Ads) -->
        <div id="panel-publicidad" class="panel">
            <!-- Se inyecta dinámicamente: img, video o html -->
        </div>
        
                
        <!-- Panel 6: Marcador -->
        <div id="panel-marcador-basquet" class="panel">
            <!-- Contenido por implementar --> 
        </div>
    </div>

  

    <!-- Panel de Debug (Toggle con tecla 'D') -->
    <div id="debug-panel" style="
        position: fixed;
        bottom: 10px;
        left: 10px;
        padding: 15px;
        background: rgba(0, 0, 0, 0.9);
        color: #0f0;
        font-family: monospace;
        font-size: 12px;
        border-radius: 8px;
        max-width: 400px;
        display: none;
        z-index: 9999;
        border: 1px solid #0f0;
    ">
        <div style="margin-bottom: 10px; font-weight: bold;">🐛 DEBUG INFO</div>
        <div id="debug-content">
            <div>Panel Activo: <span id="debug-panel-activo">-</span></div>
            <div>Escala: <span id="debug-escala">-</span></div>
            <div>Logos Activos: <span id="debug-logos">-</span></div>
            <div>Rotación: <span id="debug-rotacion">-</span></div>
        </div>
    </div>

    <!-- Módulos JavaScript -->
    <script type="module" src="app.js"></script>
</body>
</html>
